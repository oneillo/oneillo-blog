baseURL = "https://oneillo.com/"
languageCode = "en-us"
title = "Orlando O'Neill"  # Change to whatever you want
theme = "PaperMod"

[params]
  description = "Thoughts on AI, marketing, data, and whatever I'm curious about — by Orlando O'Neill."
  defaultTheme = "auto"  # auto switches between light/dark based on OS
  ShowReadingTime = true
  ShowPostNavLinks = true
  ShowBreadCrumbs = true
  ShowCodeCopyButtons = true
  ShowFullTextinRSS = true
  ShowShareButtons = true
  disableSpecial1stPost = true
  ShareButtons = ["linkedin", "x"]

[menu]
  [[menu.main]]
    identifier = "about"
    name = "About"
    url = "/about/"
    weight = 5
  [[menu.main]]
    identifier = "archive"
    name = "Archive"
    url = "/archives/"
    weight = 10
  [[menu.main]]
    identifier = "tags"
    name = "Tags"
    url = "/tags/"
    weight = 20
  [[menu.main]]
    identifier = "subscribe"
    name = "Subscribe"
    url = "/subscribe/"
    weight = 25
  [[menu.main]]
    identifier = "rss"
    name = "RSS"
    url = "/index.xml"
    weight = 30

[outputs]
  home = ["HTML", "RSS", "JSON"]  # JSON enables search if you want it later
